<!DOCTYPE html>
<html>
<head><title>API Test</title></head>
<body style="background:#111;color:#eee;font-family:monospace;padding:40px">
    <h2>Creative Tagger API Test</h2>
    <input type="file" id="f" accept="image/*,video/*">
    <button onclick="run()">Analyze</button>
    <pre id="out" style="margin-top:20px;white-space:pre-wrap;max-width:800px"></pre>
    <script>
    async function run() {
        const file = document.getElementById('f').files[0];
        if (!file) { log('Pick a file first'); return; }
        log('Uploading ' + file.name + ' (' + file.size + ' bytes)...');
        const fd = new FormData();
        fd.append('file', file);
        fd.append('brand_name', 'Test');
        try {
            log('Sending to http://localhost:8000/analyze ...');
            const resp = await fetch('http://localhost:8000/analyze', { method: 'POST', body: fd });
            log('Status: ' + resp.status + ' ' + resp.statusText);
            const text = await resp.text();
            log('Response:\n' + text);
        } catch (err) {
            log('ERROR: ' + err.name + ': ' + err.message);
            log('This usually means CORS blocked or server not reachable.');
        }
    }
    function log(msg) { document.getElementById('out').textContent += msg + '\n'; }
    </script>
</body>
</html>
